<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maze</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Zen+Dots&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>MAZE</h1>

<div id="wrapper">
  <div>
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
      <div class="stat">GOAL&nbsp;<div id="distBar"><div id="distFill"></div></div></div>
      <div class="stat">DIRECTION&nbsp;<span class="val" id="dirVal">--</span></div>
      <div class="stat">POSITION&nbsp;<span class="val" id="posVal">--,--</span></div>
    </div>
  </div>

  <div id="panel">
    <div class="panel-box" id="entire-Map">
      <h2 id="MAP-panel">MAP</h2>
      <canvas id="minimapCanvas"></canvas>
    </div>
    <div><form>
     <label for="Map-panel-check">Do you wanna hide the map?</label></br> <input type ="radio" name="Map-panel-check" value="hide">
        <label>yes</label>
        <input type ="radio" name="Map-panel-check" value="show" checked>
        <label>no</label>
    </form></div>
    <script>
     document.querySelectorAll('input[name="Map-panel-check"]').forEach(r => {
     r.onchange = () => {
     document.getElementById("entire-Map").style.display =
      r.value === "hide" ? "none" : "block";
     };
     });
    </script>

















    <div class="panel-box">
      <h2>// COMPASS</h2>
      <canvas id="compassCanvas" width="100" height="100"></canvas>
    </div>
    <div class="panel-box">
      <h2>CONTROLS</h2>
      <div class="controls">
        <span>W/↑</span> Go forward<br>
        <span>S/↓</span> Go back<br>
        <span>A/←</span> GO left<br>
        <span>D/→</span> Go right<br>
        <span>R</span>&nbsp;&nbsp; Re-start<br>
        <span>Click</span> Start
      </div>
    </div>
  </div>
</div>

<div id="overlay">
  <h2 id="overlayTitle">MAZE</h2>
  <button id="overlayBtn">START</button>
  <p id="overlayMsg"></p>
</div>

<script src="script.js"></script>
</body>
</html>
